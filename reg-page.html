<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-image: url(/images/reg-page.jpg);
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex; /* включает режим гибкого контейнера. */
            align-items: center;
            justify-content: center;
            color: white;
        }

        .reg-container {
            display: flex;
            width: 900px;
            min-height: 500px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .reg-container__left {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .reg-container__left h1 {
            font-size: 40px;
            margin-bottom: 20px;
            /* Убрали подчеркивание здесь */
        }

        .reg-container__left p {
            font-size: 18px;
            line-height: 1.4;
        }

        .reg-container__right {
            flex: 1;
            padding: 60px;
            display: flex;
            align-items: center;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        form {
            width: 100%;
        }

        /* Стили для подписей над полями как на скрине */
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        form input {
            width: 100%;
            margin-bottom: 20px;
            padding: 20px;
            color: rgb(255, 255, 255);
            border: none;
            /* убирает обводку */
            border: 1px solid rgb(255, 255, 255, 0.043);
            /* для легкой рамки, делает больше выпуклость */
            border-radius: 15px;
            background-color: #ffffff05;
            /* максимально белый */
            box-shadow:
                inset 0 1px 1px rgb(255, 255, 255, 0.6),
                /* тень внутри элемента сверху светлая */
                0 10px 30px rgba(0, 0, 0, 0.15);
            /* inset 0 1px 1px rgb(255, 255, 255, 0.6) - внутреняя тень для создания эффекта выпуклости */
            transition: 0.3s
        }

        form input:hover,
        form .btn:hover {
            background-color: #ffffff15;
            /* при наведении на поле, цвет фона становится более насыщенным */
            box-shadow:
                inset 0 2px 3px rgb(255, 255, 255, 0.8),
                0 15px 40px rgba(0, 0, 0, 0.2);
            /* при наведении на поле, тень становится более яркой и глубокой */
            transform: translateY(-2px);
            /* при наведении на поле, элемент поднимается на 2 пикселя для создания эффекта "поднятия" */
            transition: 0.3s;
            /* плавный переход цвета фона при наведении */
        }

        input::placeholder {
            color: white;
            transition: 0.3s;
        }

        input:hover::placeholder {
            /* hover меняет цвет подсказки при наведении мышкой */
            color: rgb(255, 255, 255, 0.2);
            /* при наведении на поле, цвет подсказки становится более прозрачным */
            transition: 0.3s;
            /* плавный переход цвета подсказки при наведении */
        }

        form .btn {
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
            border: none;
            /* убирает обводку */
            border: 1px solid rgb(255, 255, 255, 0.043);
            /* для легкой рамки, делает больше выпуклость */
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0);
            color: white;
            box-shadow:
                inset 0 0 0 0 rgb(255, 255, 255, 0.6),
                0 10px 30px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="reg-container">
        <div class="reg-container__left">
            <h1>Добро пожаловать</h1>
            <p>На этом сайте вы можете зарегистрироваться для того чтобы войти в личный кабинет</p>
        </div>
        <!--Два нижних подчёркивания нужны для того чтобы показать что блок находится внутри другого блока и это важно увидеть -->
        <div class="reg-container__right">
            <!-- Форма для ввода данных пользователя -->
            <!-- autocomplete="off" не будет выдавать подсказки для заполнения, так как это тестовые проекты -->
            <form autocomplete="off">
                <label>Логин</label>
                <!-- type="text" - поле ввода текста -->
                <input type="text" placeholder="Имя" maxlength="10" required>
                <!-- placeholder="Фамилия" - подсказка для заполнения поля -->
                <!-- maxlength="10" - максимальное количество символов -->
                <!-- required - поле обязательно для заполнения -->

                <label>Email</label>
                <input type="email" placeholder="Почта" required>
                <!--  type="email" - даёт возможность ввода только корректного email -->

                <label>Пароль</label>
                <input type="password" placeholder="Пароль" minlength="6" required>
                <!--  type="password" - скрывает введенный текст -->
                <!--  minlength="6" - минимальное количество символов -->
                
                <button class="btn"> Отправить </button>
            </form>
        </div>
    </div>

</body>

</html>
